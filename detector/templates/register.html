<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #6a11cb;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Create Account</h2>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Register</button>

        </form>

        <p>Already have an account?</p>

        <a href="/login/">Login here</a>

    </div>

</body>

</html>
